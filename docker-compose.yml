services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: worklog
      POSTGRES_PASSWORD: worklog
      POSTGRES_DB: worklog
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worklog -d worklog"]
      interval: 3s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://worklog:worklog@db:5432/worklog
      PAYOUT_SIMULATE_FAILURE: ${PAYOUT_SIMULATE_FAILURE:-false}
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:80,http://127.0.0.1:80
    ports:
      - "8000:8000"
    volumes:
      - ./seed:/app/seed:ro
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
