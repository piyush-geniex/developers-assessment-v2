services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: remittances
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d remittances"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend/backend-assessment
    environment:
      PORT: 3000
      DIRECT_URL: postgresql://postgres:postgres@postgres:5432/remittances?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  postgres-data:
